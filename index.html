<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Literacy Wheel Test</title>

<style>
body {
  margin: 0;
  background: white;
  display: flex;
  justify-content: center;
}

.wheel-stage {
  position: relative;
  width: min(95vw, 700px);
  height: min(95vw, 700px);
  margin-top: 20px;
}

#spinArea {
  position: absolute;
  inset: 0;
  transition: transform 8s ease-out;
  transform-origin: center center;
}

.wheel-image {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
}

.center-click {
  position: absolute;
  z-index: 999;
  top: 50%;
  left: 50%;
  width: 24%;
  height: 24%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 3px solid black;
  background: rgba(255,255,255,.65);
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wheel-stage">

  <div id="spinArea">
    <img src="./Litwheel.png" class="wheel-image" alt="Literacy Wheel">
  </div>

  <button class="center-click" onclick="spinWheel()">SPIN TEST</button>

</div>

<script>
let rotation = 0;

function spinWheel() {
  rotation += 720;
  document.getElementById("spinArea").style.transform = "rotate(" + rotation + "deg)";
}
</script>

</body>
</html>
